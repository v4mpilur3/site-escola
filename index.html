<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathQuest • Neon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0a0a0a;
      color: #e0f2fe;
    }
    .neon-text {
      text-shadow: 0 0 10px #22d3ee,
                   0 0 20px #22d3ee,
                   0 0 40px #c026d3;
    }
    .neon-button {
      transition: all 0.3s ease;
    }
    .neon-button:hover {
      box-shadow: 0 0 20px #67e8f9,
                  0 0 40px #c026d3;
      transform: translateY(-3px);
    }
    .game-card {
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid #334155;
      transition: all 0.4s ease;
    }
    .game-card:hover {
      border-color: #67e8f9;
      box-shadow: 0 0 30px rgba(103, 232, 249, 0.5);
      transform: scale(1.04);
    }
    .nav-glow {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid #67e8f9;
    }
  </style>
</head>
<body class="min-h-screen font-mono">

  <!-- Navbar Neon -->
  <nav class="nav-glow py-5 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-pink-500 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-cyan-500/50">
          ⚡
        </div>
        <h1 class="text-4xl font-bold tracking-tighter neon-text">MATHQUEST</h1>
      </div>

      <div class="flex items-center gap-8 text-lg">
        <a href="#" onclick="showSection('home')" class="hover:text-cyan-400 transition">Home</a>
        <a href="#" onclick="showSection('games')" class="hover:text-cyan-400 transition">Games</a>
        <a href="#" onclick="showSection('leaderboard')" class="hover:text-cyan-400 transition">Leaderboard</a>
        <a href="#" onclick="showSection('about')" class="hover:text-cyan-400 transition">About</a>
        
        <div class="flex items-center gap-4 pl-6 border-l border-slate-700">
          <span id="username-display" class="text-pink-400 font-medium"></span>
          <button onclick="logout()" 
                  class="neon-button bg-red-600 hover:bg-red-700 px-6 py-2 rounded-xl text-sm font-bold">
            LOGOUT
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- HOME -->
  <section id="home" class="section py-32 text-center">
    <div class="max-w-5xl mx-auto px-6">
      <h1 class="text-7xl font-bold mb-6 neon-text">
        WELCOME BACK<br>
        <span id="welcome-name" class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500"></span>
      </h1>
      <p class="text-2xl text-slate-400 mb-12">Ready to enter the neon math arena?</p>
      
      <button onclick="showSection('games')" 
              class="neon-button text-3xl font-bold px-16 py-8 bg-black border-4 border-cyan-400 text-cyan-400 rounded-3xl hover:bg-cyan-400 hover:text-black">
        START GAME
      </button>
    </div>
  </section>

  <!-- GAMES -->
  <section id="games" class="section hidden py-20 bg-black">
    <div class="max-w-6xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-16 neon-text">CHOOSE YOUR CHALLENGE</h2>
      <div id="games-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>
  </section>

  <!-- LEADERBOARD -->
  <section id="leaderboard" class="section hidden py-20 bg-black">
    <div class="max-w-5xl mx-auto px-6">
      <h2 class="text-5xl font-bold text-center mb-12 neon-text">NEON LEADERBOARD</h2>
      <div id="leaderboard-content" class="bg-slate-950 border border-slate-700 rounded-3xl p-10"></div>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section hidden py-20 bg-black">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <h2 class="text-5xl font-bold mb-12 neon-text">ABOUT MATHQUEST</h2>
      <div class="bg-slate-900 border border-slate-700 rounded-3xl p-12 text-lg leading-relaxed">
        <p>A neon cyber math experience built with passion and AI.</p>
        <p class="mt-6">Train your brain. Beat the clock. Shine in the leaderboard.</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
