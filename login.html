<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • MathQuest</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="min-h-screen bg-[#0a071f] flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-[#1a1438] rounded-3xl p-10 border border-cyan-400/30 shadow-2xl">

    <!-- Logo -->
    <div class="flex justify-center mb-10">
      <div class="flex items-center gap-3">
        <div class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-pink-500 rounded-2xl flex items-center justify-center text-4xl shadow-lg">
          ⚡
        </div>
        <h1 class="text-4xl font-bold tracking-wider text-white">MATHQUEST</h1>
      </div>
    </div>

    <!-- Tabs -->
    <div class="flex mb-10 border-b border-gray-700">
      <button onclick="showLogin()" id="loginTab"
              class="flex-1 py-4 font-bold text-lg border-b-4 border-cyan-400 text-cyan-400">
        LOGIN
      </button>
      <button onclick="showRegister()" id="registerTab"
              class="flex-1 py-4 font-bold text-lg text-gray-400">
        CREATE ACCOUNT
      </button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <input id="loginUsername" type="text" placeholder="Username" 
             class="w-full mb-4 px-6 py-4 bg-[#2a234f] border border-gray-600 rounded-2xl text-white">

      <input id="loginPassword" type="password" placeholder="Password" 
             class="w-full mb-8 px-6 py-4 bg-[#2a234f] border border-gray-600 rounded-2xl text-white">

      <button onclick="loginUser()" 
              class="w-full bg-cyan-400 hover:bg-cyan-300 text-black font-bold py-5 rounded-2xl text-xl">
        LOGIN
      </button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
      <input id="registerUsername" type="text" placeholder="Choose username" 
             class="w-full mb-4 px-6 py-4 bg-[#2a234f] border border-gray-600 rounded-2xl text-white">

      <input id="registerPassword" type="password" placeholder="Choose password (min 6 chars)" 
             class="w-full mb-8 px-6 py-4 bg-[#2a234f] border border-gray-600 rounded-2xl text-white">

      <button onclick="createAccount()" 
              class="w-full bg-cyan-400 hover:bg-cyan-300 text-black font-bold py-5 rounded-2xl text-xl">
        CREATE ACCOUNT
      </button>
    </div>

    <p id="message" class="text-center mt-8 text-red-400 font-medium min-h-[28px]"></p>
  </div>

<script>
  // ✅ INIT CORRETO
  const { createClient } = supabase;

  const supabaseClient = createClient(
    "https://onkevluevyonvqkrrnwy.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ua2V2bHVldnlvbnZxa3Jybnd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDY0NjcsImV4cCI6MjA5MjAyMjQ2N30.n7SSaQu8RQcU2Cv4XiQ_rW_NGVYfv-D_7Cp9Wuj5_-I"
  );

  const message = document.getElementById('message');

  function showLogin() {
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');

    loginTab.classList.add('text-cyan-400','border-cyan-400');
    loginTab.classList.remove('text-gray-400');

    registerTab.classList.remove('text-cyan-400','border-cyan-400');
    registerTab.classList.add('text-gray-400');

    message.textContent = "";
  }

  function showRegister() {
    loginForm.classList.add('hidden');
    registerForm.classList.remove('hidden');

    registerTab.classList.add('text-cyan-400','border-cyan-400');
    registerTab.classList.remove('text-gray-400');

    loginTab.classList.remove('text-cyan-400','border-cyan-400');
    loginTab.classList.add('text-gray-400');

    message.textContent = "";
  }

  async function createAccount() {
    const username = registerUsername.value.trim();
    const password = registerPassword.value.trim();

    message.style.color = "#f87171";
    message.textContent = "";

    if (username.length < 3) {
      message.textContent = "Username must have at least 3 characters";
      return;
    }

    if (password.length < 6) {
      message.textContent = "Password must have at least 6 characters";
      return;
    }

    const fakeEmail = username.toLowerCase() + "@mathquest.local";

    const { data, error } = await supabaseClient.auth.signUp({
      email: fakeEmail,
      password: password
    });

    if (error) {
      message.textContent = error.message;
      return;
    }

    // inserir profile com verificação
    const { error: profileError } = await supabaseClient
      .from('profiles')
      .insert({
        id: data.user.id,
        username: username
      });

    if (profileError) {
      console.error(profileError);
    }

    message.style.color = "#4ade80";
    message.textContent = "✅ Account created!";

    setTimeout(showLogin, 1500);
  }

  async function loginUser() {
    const username = loginUsername.value.trim();
    const password = loginPassword.value.trim();

    message.textContent = "";

    const fakeEmail = username.toLowerCase() + "@mathquest.local";

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: fakeEmail,
      password: password
    });

    if (error) {
      message.style.color = "#f87171";
      message.textContent = "Invalid username or password";
      return;
    }

    localStorage.setItem('mathquest_current_user', username);

    message.style.color = "#4ade80";
    message.textContent = "✅ Login successful!";

    setTimeout(() => window.location.href = "index.html", 1000);
  }

  // redirect automático se já logado
  if (localStorage.getItem('mathquest_current_user')) {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
