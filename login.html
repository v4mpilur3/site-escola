<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • MathQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-indigo-900 text-white flex items-center justify-center">
  <div class="max-w-md w-full mx-4 bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-10 shadow-2xl">
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-3 text-4xl font-bold">
        <i class="fa-solid fa-dice-d20 text-yellow-400"></i>
        MathQuest
      </div>
    </div>

    <div class="flex border-b border-white/30 mb-8">
      <button onclick="switchTab(0)" id="tab-login"
              class="flex-1 py-4 text-lg font-semibold border-b-4 border-yellow-400">Login</button>
      <button onclick="switchTab(1)" id="tab-register"
              class="flex-1 py-4 text-lg font-semibold">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <input id="login-username" type="text" placeholder="Username" 
             class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4 mb-4 text-lg focus:outline-none focus:border-yellow-400">
      <input id="login-password" type="password" placeholder="Password" 
             class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4 mb-8 text-lg focus:outline-none focus:border-yellow-400">
      <button onclick="loginUser()" 
              class="w-full bg-yellow-400 text-black font-bold py-5 rounded-3xl text-xl hover:bg-yellow-300 transition">
        Login
      </button>
    </div>

    <!-- REGISTER -->
    <div id="register-form" class="hidden">
      <input id="register-username" type="text" placeholder="Choose username" 
             class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4 mb-4 text-lg focus:outline-none focus:border-yellow-400">
      <input id="register-password" type="password" placeholder="Choose password" 
             class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-4 mb-8 text-lg focus:outline-none focus:border-yellow-400">
      <button onclick="createAccount()" 
              class="w-full bg-yellow-400 text-black font-bold py-5 rounded-3xl text-xl hover:bg-yellow-300 transition">
        Create Account
      </button>
    </div>

    <p id="message" class="text-center mt-6 text-red-400 font-medium min-h-[28px]"></p>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab === 1);
      document.getElementById('register-form').classList.toggle('hidden', tab === 0);
      
      document.getElementById('tab-login').classList.toggle('border-yellow-400', tab === 0);
      document.getElementById('tab-login').classList.toggle('border-transparent', tab === 1);
      document.getElementById('tab-register').classList.toggle('border-yellow-400', tab === 1);
      document.getElementById('tab-register').classList.toggle('border-transparent', tab === 0);
    }

    function saveUsers(users) {
      localStorage.setItem('mathquest_users', JSON.stringify(users));
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem('mathquest_users')) || [];
    }

    function createAccount() {
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value.trim();
      const message = document.getElementById('message');

      if (!username || !password) {
        message.textContent = "Fill all fields!";
        return;
      }

      const users = getUsers();
      if (users.find(u => u.username === username)) {
        message.textContent = "Username already exists!";
        return;
      }

      users.push({ username, password });
      saveUsers(users);

      message.classList.add('text-green-400');
      message.textContent = "Account created! You can now login.";
      
      setTimeout(() => switchTab(0), 1500);
    }

    function loginUser() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const message = document.getElementById('message');

      const users = getUsers();
      const user = users.find(u => u.username === username && u.password === password);

      if (user) {
        localStorage.setItem('mathquest_current_user', username);
        message.classList.add('text-green-400');
        message.textContent = "Login successful! Redirecting...";
        setTimeout(() => window.location.href = 'index.html', 800);
      } else {
        message.textContent = "Wrong username or password!";
      }
    }

    // Se já estiver logado, vai direto para o site
    if (localStorage.getItem('mathquest_current_user')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
